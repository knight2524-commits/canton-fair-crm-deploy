// ── API Key helpers ──
function getApiKey() { try { return localStorage.getItem("cf-api-key") || ""; } catch(e) { return ""; } }
function saveApiKey(k) { try { localStorage.setItem("cf-api-key", k); } catch(e) {} }

function useStorage() {
  const [cards, setCards] = useState([]);
  const [calcHistory, setCalcHistory] = useState([]);
  const loaded = useRef(false);
  useEffect(() => {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        const p = JSON.parse(raw);
        if (Array.isArray(p)) setCards(p);
        else { setCards(p.cards || []); setCalcHistory(p.calcHistory || []); }
      }
    } catch(e) {}
    loaded.current = true;
  }, []);
  useEffect(() => {
    if (!loaded.current) return;
    const t = setTimeout(() => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ cards, calcHistory })); } catch(e) {}
    }, 400);
    return () => clearTimeout(t);
  }, [cards, calcHistory]);
  return [cards, setCards, calcHistory, setCalcHistory];
}

// ─── CARD FORM + AI SCAN COMPONENT ───
function ScanView({ onSave, onCancel, editData }) {
  const [scanning, setScanning] = useState(false);
  const [scanned, setScanned] = useState(false);
  const [scanError, setScanError] = useState("");
  const [form, setForm] = useState(editData || { ...emptyCard });
  const [cardPreview, setCardPreview] = useState(editData?.cardImage || null);
  const [section, setSection] = useState("basic");
  const [showPaste, setShowPaste] = useState(false);
  const [pasteText, setPasteText] = useState("");
  const [parsed, setParsed] = useState(null);
  const cameraRef = useRef(null);
  const galleryRef = useRef(null);

  const updateForm = (field, value) => setForm(f => ({ ...f, [field]: value }));

  // ── Text Parser ──
  const parseBusinessCardText = (text) => {
    const lines = text.split(/\n/).map(l => l.trim()).filter(Boolean);
    const result = {};

    const emailRx = /[\w.+-]+@[\w.-]+\.\w{2,}/i;
    const phoneRx = /[\+]?[\d\s\-().]{7,}/;
    const urlRx = /(?:https?:\/\/)?(?:www\.)?[\w.-]+\.\w{2,}/i;
    const wechatRx = /(?:wechat|微信|WeChat)\s*[:：]?\s*(\S+)/i;

    const positionKw = ['manager','director','president','ceo','cfo','coo','cto','vp','supervisor','chairman','chief','head','officer','executive','engineer','representative','sales','marketing','coordinator','assistant','specialist','general','deputy','senior','junior','lead','team','dept','division'];
    const deptKw = ['department','dept','division','team','부서','部门','部門','sales','marketing','export','import','trade','engineering','R&D','QC','quality'];

    const foundEmails = [];
    const foundPhones = [];
    const foundUrls = [];
    const otherLines = [];

    lines.forEach(line => {
      const wm = line.match(wechatRx);
      if (wm) { result.wechat = wm[1]; return; }

      const em = line.match(emailRx);
      if (em) { foundEmails.push(em[0]); 
        const rest = line.replace(em[0], '').trim();
        if (rest && !result.name) otherLines.push(rest);
        return; 
      }

      const um = line.match(urlRx);
      if (um && !line.includes('@')) {
        let url = um[0];
        if (!url.startsWith('http')) url = 'https://' + url;
        foundUrls.push(url);
        return;
      }

      const pm = line.match(phoneRx);
      if (pm && pm[0].replace(/\D/g,'').length >= 7) {
        foundPhones.push(pm[0].trim());
        const label = line.replace(pm[0], '').trim().toLowerCase();
        if (label.includes('mob') || label.includes('cell') || label.includes('휴대') || label.includes('手机')) {
          result._mobileIdx = foundPhones.length - 1;
        }
        return;
      }

      otherLines.push(line);
    });

    if (foundEmails.length > 0) result.email = foundEmails[0];
    if (foundUrls.length > 0) result.website = foundUrls[0];

    if (foundPhones.length === 1) {
      result.phone = foundPhones[0];
    } else if (foundPhones.length >= 2) {
      if (result._mobileIdx !== undefined) {
        result.mobile = foundPhones[result._mobileIdx];
        result.phone = foundPhones.find((_, i) => i !== result._mobileIdx) || '';
      } else {
        result.phone = foundPhones[0];
        result.mobile = foundPhones[1];
      }
    }
    delete result._mobileIdx;

    // Classify other lines
    otherLines.forEach((line, i) => {
      const lower = line.toLowerCase();

      // Address patterns
      if (/\d{5,6}/.test(line) || /省|市|区|road|street|floor|building|guangzhou|shenzhen|shanghai|dong|lu|区|号|栋|층|로|길/i.test(line)) {
        if (!result.address) { result.address = line; return; }
      }

      // Position
      if (positionKw.some(k => lower.includes(k)) || /총|이사|대표|부장|과장|사원|팀장|실장|경리|主任|经理|总监/.test(line)) {
        if (!result.position) { result.position = line; return; }
      }

      // Department
      if (deptKw.some(k => lower.includes(k))) {
        if (!result.department) { result.department = line; return; }
      }

      // Company (usually longest line or has Co./Ltd/Inc/公司/有限)
      if (/co\.|ltd|inc|corp|gmbh|llc|plc|公司|有限|집단|그룹|enterprise|industry|trading|technology|tech/i.test(line)) {
        if (!result.companyName) { result.companyName = line; return; }
        if (!result.companyNameCn && /[\u4e00-\u9fff]/.test(line)) { result.companyNameCn = line; return; }
      }

      // Remaining: guess name vs company
      if (i === 0 && !result.companyName && line.length > 10) {
        result.companyName = line;
      } else if (!result.name && line.length <= 20 && !/\d/.test(line)) {
        result.name = line;
      } else if (!result.companyName) {
        result.companyName = line;
      }
    });

    // Chinese company name detection
    if (result.companyName && /[\u4e00-\u9fff]/.test(result.companyName) && !result.companyNameCn) {
      result.companyNameCn = result.companyName;
    }

    return result;
  };

  const doParse = () => {
    if (!pasteText.trim()) return;
    const p = parseBusinessCardText(pasteText);
    setParsed(p);
  };

  const applyParsed = () => {
    if (!parsed) return;
    setForm(f => ({
      ...f,
      ...Object.fromEntries(Object.entries(parsed).filter(([_, v]) => v)),
    }));
    setShowPaste(false);
    setPasteText("");
    setParsed(null);
  };

  const processImage = async (file) => {
    if (!file || !file.type.startsWith("image/")) return;
    setScanError("");
    const reader = new FileReader();
    reader.onload = async (ev) => {
      const img = new Image();
      img.onload = async () => {
        const canvas = document.createElement("canvas");
        const MAX = 600;
        let w = img.width, h = img.height;
        if (w > h) { h = h * MAX / w; w = MAX; } else { w = w * MAX / h; h = MAX; }
        canvas.width = w; canvas.height = h;
        canvas.getContext("2d").drawImage(img, 0, 0, w, h);
        const dataUrl = canvas.toDataURL("image/jpeg", 0.8);
        const b64 = dataUrl.split(",")[1];
        setCardPreview(dataUrl);

        const apiKey = getApiKey();
        if (!apiKey) {
          setForm(f => ({ ...f, cardImage: dataUrl }));
          setScanError("API 키가 없어 AI 인식을 건너뜁니다. 수동으로 입력하세요.");
          return;
        }

        setScanning(true);
        try {
          const resp = await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=" + apiKey, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{
                parts: [
                  { inlineData: { mimeType: "image/jpeg", data: b64 } },
                  { text: "이 명함에서 정보를 추출하세요. JSON만 응답 (다른 텍스트 없이):\n{\"companyName\":\"\",\"companyNameCn\":\"\",\"name\":\"\",\"position\":\"\",\"department\":\"\",\"phone\":\"\",\"mobile\":\"\",\"email\":\"\",\"wechat\":\"\",\"address\":\"\",\"website\":\"\"}\n없는 필드는 빈 문자열로." }
                ]
              }],
              generationConfig: { temperature: 0.1, maxOutputTokens: 1000 }
            }),
          });
          const data = await resp.json();
          if (data.error) { setScanError("API 오류: " + (data.error.message || "알 수 없음")); setForm(f => ({ ...f, cardImage: dataUrl })); }
          else {
            const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
            const clean = text.replace(/```json|```/g, "").trim();
            // Fix unescaped newlines/tabs inside JSON strings
            const safeJson = clean.replace(/\n/g, "\\n").replace(/\r/g, "").replace(/\t/g, " ");
            // Try parsing, fallback to regex extraction
            let jsonParsed = {};
            try { jsonParsed = JSON.parse(safeJson); } catch(e2) {
              try {
                // Extract JSON object from messy text
                const m = clean.match(/\{[\s\S]*\}/);
                if (m) {
                  const fixed = m[0].replace(/\n/g, " ").replace(/\r/g, "").replace(/\t/g, " ");
                  jsonParsed = JSON.parse(fixed);
                }
              } catch(e3) {
                // Last resort: extract fields with regex
                const rx = (key) => { const r = new RegExp('"' + key + '"\\s*:\\s*"([^"]*)"'); const m2 = clean.match(r); return m2 ? m2[1] : ""; };
                jsonParsed = {companyName:rx("companyName"),companyNameCn:rx("companyNameCn"),name:rx("name"),position:rx("position"),department:rx("department"),phone:rx("phone"),mobile:rx("mobile"),email:rx("email"),wechat:rx("wechat"),address:rx("address"),website:rx("website")};
              }
            }
            setForm(f => ({ ...f, ...Object.fromEntries(Object.entries(jsonParsed).filter(([_, v]) => v)), cardImage: dataUrl }));
            setScanned(true);
          }
        } catch (err) {
          setScanError("스캔 실패: " + err.message);
          setForm(f => ({ ...f, cardImage: dataUrl }));
        }
        setScanning(false);
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  };

  const handleFile = (e) => { const f = e.target.files?.[0]; if (f) processImage(f); };

  const save = () => {
    if (!form.companyName && !form.name) { alert("회사명 또는 담당자명을 입력하세요"); return; }
    onSave({ ...form });

  ];

  return (

// ─── CARD LIST VIEW ───
function CardListView({ cards, onEdit, onDelete, onStatusChange }) {
  const [search, setSearch] = useState("");
  const [filterCat, setFilterCat] = useState("all");
  const [filterStatus, setFilterStatus] = useState("all");
  const [sortBy, setSortBy] = useState("date");
  const [expandedId, setExpandedId] = useState(null);

  const filtered = cards.filter(c => {
    const term = search.toLowerCase();
    const matchSearch = !term || c.companyName?.toLowerCase().includes(term) ||
      c.name?.toLowerCase().includes(term) || c.boothNo?.toLowerCase().includes(term) ||
      c.products?.toLowerCase().includes(term);
    const matchCat = filterCat === "all" || c.category === filterCat;
    const matchStatus = filterStatus === "all" || c.status === filterStatus;
    return matchSearch && matchCat && matchStatus;
  }).sort((a, b) => {
    if (sortBy === "rating") return (b.rating || 0) - (a.rating || 0);
    if (sortBy === "name") return (a.companyName || "").localeCompare(b.companyName || "");
    return new Date(b.createdAt || 0) - new Date(a.createdAt || 0);
  });

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
      {/* Search */}
      <div style={{ position: "relative" }}>
        <span style={{ position: "absolute", left: 12, top: "50%", transform: "translateY(-50%)", color: T.textDim }}>{Icon.search}</span>

          placeholder="업체명, 담당자, 부스번호, 제품..."
          style={{
            width: "100%", padding: "12px 12px 12px 40px", background: T.card,

          borderRadius: 8, color: T.text, fontSize: 12,

// ─── DASHBOARD VIEW ───
function DashboardView({ cards }) {
  const totalCards = cards.length;
  const avgRating = totalCards ? (cards.reduce((a, c) => a + (c.rating || 0), 0) / totalCards).toFixed(1) : "—";
  const topRated = cards.filter(c => c.rating >= 4).length;

  // Category breakdown
  const catCounts = {};
  cards.forEach(c => { const k = c.category || "other"; catCounts[k] = (catCounts[k] || 0) + 1; });

  // Status breakdown
  const statusCounts = {};
  cards.forEach(c => { const k = c.status || "pending"; statusCounts[k] = (statusCounts[k] || 0) + 1; });

  // Hall breakdown
  const hallCounts = {};
  cards.forEach(c => { if (c.hall) hallCounts[c.hall] = (hallCounts[c.hall] || 0) + 1; });

  // Top suppliers
  const topSuppliers = [...cards].sort((a, b) => (b.rating || 0) - (a.rating || 0)).slice(0, 5);

  // Export CSV
  const exportCSV = () => {
    const headers = "회사명,중문명,담당자,직책,전화,모바일,이메일,위챗,주소,전시관,부스,카테고리,제품,단가,MOQ,리드타임,인증,평점,상태,메모,방문일\n";
    const rows = cards.map(c => {
      const cat = CATEGORIES.find(ct => ct.id === c.category)?.label || "";
      const st = FOLLOWUP_STATUS.find(s => s.id === c.status)?.label || "";
      return [c.companyName, c.companyNameCn, c.name, c.position, c.phone, c.mobile,
        c.email, c.wechat, c.address, c.hall, c.boothNo, cat, c.products,
        c.unitPrice, c.moq, c.leadTime, c.certification, c.rating, st,
        `"${(c.memo || "").replace(/"/g, '""')}"`, c.visitDate].join(",");
    }).join("\n");
    const blob = new Blob(["\uFEFF" + headers + rows], { type: "text/csv;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = `cantonfair_contacts_${new Date().toISOString().split("T")[0]}.csv`;
    a.click(); URL.revokeObjectURL(url);
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
      {/* KPI Row */}
      <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10 }}>
        {[
          { label: "총 카드", value: totalCards, color: T.accent },
          { label: "평균 평점", value: avgRating, color: T.gold },
          { label: "우수(4+)", value: topRated, color: T.green },
        ].map(kpi => (
          <div key={kpi.label} style={{
            background: T.card, borderRadius: 14, padding: "14px", textAlign: "center",
          }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: kpi.color }}>{kpi.value}</div>
            <div style={{ fontSize: 11, color: T.textSec }}>{kpi.label}</div>
          </div>
        ))}
      </div>

      {/* Status Pipeline */}
      <div style={{ background: T.card, borderRadius: 14, padding: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 12 }}>📊 팔로업 파이프라인</div>
        <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
          {FOLLOWUP_STATUS.map(s => {
            const count = statusCounts[s.id] || 0;
            const pct = totalCards ? (count / totalCards * 100) : 0;
            return (
              <div key={s.id} style={{ display: "flex", alignItems: "center", gap: 10 }}>
                <span style={{ fontSize: 12, color: s.color, fontWeight: 600, width: 60 }}>{s.label}</span>
                <div style={{ flex: 1, height: 8, background: T.inputBg, borderRadius: 99, overflow: "hidden" }}>
                  <div style={{
                    height: "100%", borderRadius: 99, background: s.color,
                    width: `${pct}%`, transition: "width 0.4s",
                  }} />
                </div>
                <span style={{ fontSize: 12, color: T.textSec, fontWeight: 600, width: 28, textAlign: "right" }}>{count}</span>
              </div>
            );
          })}
        </div>
      </div>

      {/* Category */}
      <div style={{ background: T.card, borderRadius: 14, padding: 16 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 12 }}>📁 카테고리별</div>
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {CATEGORIES.filter(c => catCounts[c.id]).map(c => (
            <div key={c.id} style={{

              display: "flex", alignItems: "center", gap: 6,

              <span>{c.icon}</span>

      {/* Hall Map */}

          <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 12 }}>🏛️ 전시관별 방문</div>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {Object.entries(hallCounts).sort(([a], [b]) => a.localeCompare(b)).map(([hall, cnt]) => (

      {/* Top Suppliers */}
      {topSuppliers.length > 0 && (
        <div style={{ background: T.card, borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: T.text, marginBottom: 12 }}>⭐ TOP 공급업체</div>
          {topSuppliers.map((c, i) => (
            <div key={c.id} style={{
              display: "flex", alignItems: "center", gap: 10, padding: "8px 0",
              borderBottom: i < topSuppliers.length - 1 ? `1px solid ${T.border}` : "none",

                {[1,2,3,4,5].map(j => (
                  <svg key={j} width="10" height="10" viewBox="0 0 24 24"
                    fill={j <= c.rating ? "#D4AF37" : "none"} stroke={j <= c.rating ? "#D4AF37" : "#444"} strokeWidth="2">
                    <polygon points="12,2 15.09,8.26 22,9.27 17,14.14 18.18,21.02 12,17.77 5.82,21.02 7,14.14 2,9.27 8.91,8.26"/>

      {/* Export */}

      </Btn>
    </div>
  );
}

// ─── CALCULATOR VIEW (BizCard Pro style + Supplier Linking) ───
function CalcView({ cards, calcHistory, setCalcHistory }) {
  const [linkedSupplier, setLinkedSupplier] = useState(null);
  const [showSupplierPicker, setShowSupplierPicker] = useState(false);
  const [activeCur, setActiveCur] = useState("USD");
  const [rates, setRates] = useState({ USD: "1380", CNY: "190", JPY: "9.2" });
  const [formulas, setFormulas] = useState({ USD: "*1.12*1.08", CNY: "*1.12*1.08", JPY: "*1.12*1.08" });
  const [prices, setPrices] = useState({ USD: "", CNY: "", JPY: "" });
  const [supplierName, setSupplierName] = useState("");
  const [productName, setProductName] = useState("");

  const CURRENCIES = [
    { id: "USD", label: "① USD 달러", symbol: "$", color: "#22D3EE" },
    { id: "CNY", label: "② CNY 위안", symbol: "¥", color: "#F59E0B" },
    { id: "JPY", label: "③ JPY 엔", symbol: "¥", color: "#F87171" },
  ];
  const MARGINS = [5, 10, 15, 20, 25, 30, 35, 40, 45, 50];
  const cur = CURRENCIES.find(c => c.id === activeCur);
  const fmt = n => (n === null || isNaN(n)) ? "—" : "₩" + Math.round(n).toLocaleString("ko-KR");

  const evalCost = (unitPrice, rate, formula) => {
    try {
      const base = unitPrice * rate;
      const clean = formula.replace(/[^0-9.*+\-/(). ]/g, "");
      const cost = Function('"use strict";return (' + base + clean + ")")();
      return isNaN(cost) ? null : cost;
    } catch(e) { return null; }
  };

  const unitPrice = parseFloat(prices[activeCur]) || 0;
  const rate = parseFloat(rates[activeCur]) || 0;
  const cost = unitPrice > 0 && rate > 0 ? evalCost(unitPrice, rate, formulas[activeCur]) : null;

  const linkSupplier = (card) => {
    setLinkedSupplier(card);
    setSupplierName(card.companyName || "");
    setProductName(card.products || "");
    const priceNum = card.unitPrice?.replace(/[^0-9.]/g, "") || "";
    if (priceNum) setPrices(p => ({ ...p, USD: priceNum }));
    setShowSupplierPicker(false);
  };

  const saveCalc = () => {
    if (!unitPrice || cost === null) return;
    setCalcHistory(prev => [
      {
        id: Date.now(), supplierName, productName,
        currency: activeCur, unitPrice: prices[activeCur],
        rate: rates[activeCur], formula: formulas[activeCur],
        cost: Math.round(cost),
        linkedSupplierId: linkedSupplier?.id || null,
        timestamp: new Date().toISOString(),
      },
      ...(prev || []).slice(0, 29),
    ]);
  };

  const deleteCalc = (id) => {
    setCalcHistory(prev => (prev || []).filter(h => h.id !== id));
  };

  const loadCalc = (h) => {
    setActiveCur(h.currency || "USD");
    setRates(r => ({ ...r, [h.currency || "USD"]: h.rate || "1380" }));
    setFormulas(f => ({ ...f, [h.currency || "USD"]: h.formula || "*1.12*1.08" }));
    setPrices(p => ({ ...p, [h.currency || "USD"]: h.unitPrice || "" }));
    setSupplierName(h.supplierName || "");
    setProductName(h.productName || "");
    if (h.linkedSupplierId) {
      const found = cards.find(c => c.id === h.linkedSupplierId);
      if (found) setLinkedSupplier(found);
    }
  };

  const resetFormula = () => {
    setFormulas(f => ({ ...f, [activeCur]: "*1.12*1.08" }));
  };

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: 14 }}>
      {/* Supplier Link */}
      <div style={{ background: T.card, borderRadius: 14, padding: 16 }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 10 }}>
          <span style={{ fontSize: 14, fontWeight: 700, color: T.text }}>🔗 공급업체 연동</span>
          <Btn variant="secondary" onClick={() => setShowSupplierPicker(true)} style={{ padding: "6px 12px", fontSize: 12 }}>
            {Icon.link} 카드에서 불러오기
          </Btn>
        </div>
        {linkedSupplier && (
          <div style={{
            background: T.accentDim, borderRadius: 10, padding: 10,
            display: "flex", alignItems: "center", gap: 10,
            borderLeft: `3px solid ${T.accent}`, marginBottom: 10,
          }}>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>{linkedSupplier.companyName}</div>
              <div style={{ fontSize: 11, color: T.textSec }}>
                {linkedSupplier.products?.substring(0, 40)} · {linkedSupplier.unitPrice || "—"}
              </div>
            </div>
            <button onClick={() => setLinkedSupplier(null)} style={{
              background: "none", border: "none", color: T.textDim, cursor: "pointer", fontSize: 14,
            }}>✕</button>
          </div>
        )}
        <div style={{ display: "flex", gap: 8 }}>
          <div style={{ flex: 1 }}><Input label="공급업체명" value={supplierName} onChange={e => setSupplierName(e.target.value)} placeholder="업체명" /></div>
          <div style={{ flex: 1 }}><Input label="제품명" value={productName} onChange={e => setProductName(e.target.value)} placeholder="제품/모델" /></div>
        </div>
      </div>

      {/* Supplier Picker Modal */}
      {showSupplierPicker && (
        <div style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 200,
          background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "flex-end", justifyContent: "center",
        }}>
          <div style={{
            width: "100%", maxWidth: 480, maxHeight: "70vh", overflowY: "auto",
            background: T.card, borderRadius: "20px 20px 0 0", padding: 20,
          }}>
            <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 16 }}>
              <span style={{ fontSize: 16, fontWeight: 700, color: T.text }}>📇 카드 선택</span>
              <button onClick={() => setShowSupplierPicker(false)} style={{
                background: "none", border: "none", color: T.textSec, fontSize: 18, cursor: "pointer",
              }}>✕</button>
            </div>
            {cards.length === 0 ? (
              <div style={{ textAlign: "center", padding: 30, color: T.textDim, fontSize: 13 }}>등록된 카드가 없습니다</div>
            ) : cards.map(card => (

                    {card.products?.substring(0, 30) || "제품 미입력"} · {card.unitPrice || "—"}
                  </div>
                </div>
              </button>
            ))}
          </div>
        </div>
      )}

      {/* Currency Tabs */}
      <div style={{ display: "flex", gap: 6 }}>
        {CURRENCIES.map(c => (
          <button key={c.id} onClick={() => setActiveCur(c.id)} style={{
            flex: 1, padding: "9px 4px", borderRadius: 10, fontSize: 11,

            <label style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>환율 (→ 원화 ₩)</label>
            <input type="number" value={rates[activeCur]}
              onChange={e => setRates(r => ({ ...r, [activeCur]: e.target.value }))}
              style={{
                width: "100%", padding: "10px 12px", background: T.inputBg,
                border: `1px solid ${cur.color}44`, borderRadius: 10, color: T.text,
                fontSize: 14, outline: "none", boxSizing: "border-box",
              }}
            />
          </div>
          <div style={{ flex: 1 }}>
            <label style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 0.5, display: "block", marginBottom: 4 }}>단가 입력</label>
            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
              <span style={{ fontSize: 15, color: cur.color, fontWeight: 700, width: 16 }}>{cur.symbol}</span>
              <input type="number" value={prices[activeCur]} placeholder="단가"
                onChange={e => setPrices(p => ({ ...p, [activeCur]: e.target.value }))}
                style={{
                  flex: 1, padding: "10px 12px", background: T.inputBg,
                  border: `1px solid ${cur.color}44`, borderRadius: 10, color: T.text,
                  fontSize: 14, outline: "none", boxSizing: "border-box",
                }}
              />
            </div>
          </div>
        </div>
      </div>

      {/* Results */}
      <div style={{ background: T.card, borderRadius: 14, padding: 16, border: `1px solid ${cur.color}33` }}>
        {/* Cost */}
        <div style={{
          display: "flex", justifyContent: "space-between", alignItems: "center",
          paddingBottom: 12, marginBottom: 12, borderBottom: `1px solid ${T.border}`,
        }}>
          <div>
            <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", marginBottom: 2 }}>원가 (Cost)</div>
            <div style={{ fontSize: 11, color: T.textDim, fontFamily: "monospace" }}>
              {cost !== null ? `${cur.symbol}${prices[activeCur]} × ${rates[activeCur]} ${formulas[activeCur]}` : "—"}
            </div>
          </div>
          <div style={{ fontSize: 22, fontWeight: 800, color: cur.color }}>
            {fmt(cost)}
          </div>
        </div>

        {/* Margin Table */}
        <div style={{ fontSize: 10, fontWeight: 700, color: T.textDim, textTransform: "uppercase", letterSpacing: 0.5, marginBottom: 10 }}>
          예상 판매가
        </div>
        <table style={{ width: "100%", borderCollapse: "collapse" }}>
          <thead>
            <tr>
              <th style={{ fontSize: 9, fontWeight: 700, color: T.textDim, textTransform: "uppercase", padding: "4px 6px", borderBottom: `1px solid ${T.border}`, textAlign: "left" }}>마진</th>
              <th style={{ fontSize: 9, fontWeight: 700, color: T.textDim, textTransform: "uppercase", padding: "4px 6px", borderBottom: `1px solid ${T.border}`, textAlign: "right" }}>판매가</th>
              <th style={{ fontSize: 9, fontWeight: 700, color: T.textDim, textTransform: "uppercase", padding: "4px 6px", borderBottom: `1px solid ${T.border}`, textAlign: "right" }}>단위이익</th>
            </tr>
          </thead>
          <tbody>
            {MARGINS.map(m => {
              const sale = cost !== null ? Math.round(cost / (1 - m / 100)) : null;
              const profit = sale !== null ? sale - Math.round(cost) : null;
              const mColor = m <= 15 ? T.textSec : m <= 30 ? "#FBBF24" : T.green;
              return (
                <tr key={m}>
                  <td style={{ padding: "7px 6px", borderBottom: `1px solid ${T.bg}`, fontSize: 13, fontWeight: 700, color: mColor }}>{m}%</td>
                  <td style={{ padding: "7px 6px", borderBottom: `1px solid ${T.bg}`, fontSize: 13, fontWeight: 700, color: cur.color, textAlign: "right" }}>{fmt(sale)}</td>
                  <td style={{ padding: "7px 6px", borderBottom: `1px solid ${T.bg}`, fontSize: 12, color: T.textSec, textAlign: "right" }}>{profit !== null ? "+" + fmt(profit) : "—"}</td>
                </tr>
              );
            })}
          </tbody>
        </table>

        <Btn onClick={saveCalc} style={{ width: "100%", marginTop: 14, fontSize: 13 }}>💾 계산 결과 저장</Btn>
      </div>

      {/* History */}
      {(calcHistory || []).length > 0 && (
        <div style={{ background: T.card, borderRadius: 14, padding: 16 }}>
          <div style={{ fontSize: 14, fontWeight: 700, color: T.text, marginBottom: 12 }}>📋 저장된 계산 ({calcHistory.length}건)</div>
          {(calcHistory || []).map(h => {
            const hCur = CURRENCIES.find(c => c.id === h.currency) || CURRENCIES[0];
            return (
              <div key={h.id} style={{
                background: T.inputBg, borderRadius: 10, padding: 12, marginBottom: 8,
                border: `1px solid ${T.border}`,
              }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 6 }}>
                  <div>
                    <div style={{ fontSize: 13, fontWeight: 700, color: T.text }}>
                      {h.supplierName || "미지정"} {h.productName ? `· ${h.productName}` : ""}
                    </div>
                    <div style={{ fontSize: 11, color: T.textDim, marginTop: 2 }}>
                      {new Date(h.timestamp).toLocaleDateString("ko")} · {hCur.symbol}{h.unitPrice} × {h.rate}
                    </div>
                  </div>
                  <div style={{ display: "flex", gap: 4 }}>
                    <button onClick={() => loadCalc(h)} style={{
                      background: T.blueDim, border: "none", color: T.blue,
                      borderRadius: 6, padding: "4px 8px", fontSize: 11, fontWeight: 600, cursor: "pointer",
                    }}>불러오기</button>
                    <button onClick={() => deleteCalc(h.id)} style={{
                      background: "rgba(239,68,68,0.1)", border: "none", color: T.red,
                      borderRadius: 6, padding: "4px 6px", fontSize: 11, cursor: "pointer",
                    }}>{Icon.trash}</button>
                  </div>
                </div>
                <div style={{ display: "flex", justifyContent: "space-between", fontSize: 12, alignItems: "center" }}>
                  <Badge color={hCur.color}>{h.currency}</Badge>
                  <span style={{ color: hCur.color, fontWeight: 700 }}>원가: {fmt(h.cost)}</span>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ─── MAIN APP ───
function CantonFairBizCard() {
  const [cards, setCards, calcHistory, setCalcHistory] = useStorage();
  const [activeTab, setActiveTab] = useState("list");
  const [showScan, setShowScan] = useState(false);
  const [editCard, setEditCard] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [apiKeyInput, setApiKeyInput] = useState(getApiKey());

  const handleSave = (cardData) => {
    if (editCard) {
      setCards(prev => prev.map(c => c.id === editCard.id ? { ...c, ...cardData, updatedAt: new Date().toISOString() } : c));
    } else {
      setCards(prev => [{ id: Date.now(), ...cardData, createdAt: new Date().toISOString() }, ...prev]);
    }
    setShowScan(false);
    setEditCard(null);
  };

  const handleEdit = (card) => {
    setEditCard(card);
    setShowScan(true);
  };

  const handleDelete = (id) => {
    setCards(prev => prev.filter(c => c.id !== id));
  };

  const handleStatusChange = (id, status) => {
    setCards(prev => prev.map(c => c.id === id ? { ...c, status } : c));
  };

  const tabs = [
    { id: "scan", label: "스캔", icon: Icon.scan },
    { id: "list", label: "카드", icon: Icon.list },
    { id: "calc", label: "계산기", icon: Icon.calc },
    { id: "dashboard", label: "분석", icon: Icon.chart },
  ];

  return (
    <div style={{
      minHeight: "100vh", background: T.bg, color: T.text,
      fontFamily: "'Pretendard', 'Apple SD Gothic Neo', -apple-system, sans-serif",
      maxWidth: 480, margin: "0 auto", position: "relative",
    }}>
      {/* Header */}
      <div style={{
        background: `linear-gradient(135deg, ${T.accent}DD, #8B6940DD)`,
        padding: "18px 20px 22px", position: "sticky", top: 0, zIndex: 50,
        backdropFilter: "blur(10px)",
      }}>
        <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
          <div style={{
            width: 38, height: 38, borderRadius: 10, background: "rgba(255,255,255,0.2)",
            display: "flex", alignItems: "center", justifyContent: "center", fontSize: 22,
          }}>📇</div>
          <div>
            <div style={{ fontSize: 17, fontWeight: 800, color: "#fff", letterSpacing: -0.5 }}>
              Canton Fair CRM
            </div>
            <div style={{ fontSize: 11, color: "rgba(255,255,255,0.7)" }}>
              제139회 · Gemini AI 명함 스캔 & 고객관리
            </div>
          </div>
          <div style={{ marginLeft: "auto", display: "flex", alignItems: "center", gap: 8 }}>
            <Badge color="#fff" bg="rgba(255,255,255,0.2)">{cards.length}장</Badge>
            <button onClick={() => setShowSettings(true)} style={{ background: "rgba(255,255,255,0.15)", border: "none", borderRadius: 8, padding: "6px 8px", cursor: "pointer", color: "#fff", fontSize: 14 }}>⚙️</button>
          </div>
        </div>
      </div>

      {/* FAB - Scan */}
      <button onClick={() => { setEditCard(null); setShowScan(true); }} style={{
        position: "fixed", right: 20, bottom: 80, zIndex: 40, width: 56, height: 56,
        borderRadius: 16, background: T.accent, border: "none", cursor: "pointer",
        display: "flex", alignItems: "center", justifyContent: "center",
        boxShadow: `0 4px 20px ${T.accent}66`, color: "#fff",
      }}>
        <div style={{ transform: "scale(1.3)" }}>{Icon.plus}</div>
      </button>

      {/* Content */}
      <div style={{ padding: "16px 16px 90px" }}>
        {activeTab === "list" && (
          <CardListView
            cards={cards}
            onEdit={handleEdit}
            onDelete={handleDelete}
            onStatusChange={handleStatusChange}
          />
        )}
        {activeTab === "scan" && (
          <div style={{ textAlign: "center", padding: "32px 20px" }}>
            <div style={{ fontSize: 48, marginBottom: 16 }}>📸</div>
            <div style={{ fontSize: 16, fontWeight: 700, color: T.text, marginBottom: 8 }}>명함 스캔 & 등록</div>
            <div style={{ fontSize: 13, color: T.textSec, marginBottom: 20, lineHeight: 1.6 }}>명함을 촬영하거나 수동으로 입력하세요</div>
            <div style={{
              display: "inline-flex", alignItems: "center", gap: 6, padding: "6px 14px", borderRadius: 99, marginBottom: 20,
              background: getApiKey() ? "rgba(34,197,94,0.1)" : "rgba(245,158,11,0.1)",
              border: "1px solid " + (getApiKey() ? "#22C55E33" : "#F59E0B33"),
              fontSize: 12, fontWeight: 600, color: getApiKey() ? "#22C55E" : "#F59E0B",
            }}>{getApiKey() ? "✅ AI 스캔 활성 (Gemini 무료)" : "⚠️ 수동 입력 모드 (⚙️에서 API 키 설정)"}</div>
            <div style={{ display: "flex", flexDirection: "column", gap: 10, maxWidth: 320, margin: "0 auto" }}>
              <Btn onClick={() => { setEditCard(null); setShowScan(true); }} style={{ width: "100%", padding: "14px 20px", fontSize: 15 }}>📷 명함 스캔 / 등록</Btn>
            </div>
          </div>
        )}
        {activeTab === "dashboard" && <DashboardView cards={cards} />}
        {activeTab === "calc" && (
          <CalcView cards={cards} calcHistory={calcHistory} setCalcHistory={setCalcHistory} />
        )}
      </div>

      {/* Bottom Tab Bar */}
      <div style={{
        position: "fixed", bottom: 0, left: "50%", transform: "translateX(-50%)",
        width: "100%", maxWidth: 480, background: `${T.surface}F0`,
        backdropFilter: "blur(20px)", borderTop: `1px solid ${T.border}`,
        display: "flex", padding: "6px 0 env(safe-area-inset-bottom, 8px)", zIndex: 50,
      }}>
        {tabs.map(tab => {
          const active = activeTab === tab.id;
          return (
            <button key={tab.id} onClick={() => setActiveTab(tab.id)} style={{
              flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 2,
              padding: "8px 0", background: "none", border: "none", cursor: "pointer",
              color: active ? T.accent : T.textDim, transition: "color 0.2s",
            }}>
              <div style={{ transform: active ? "scale(1.1)" : "scale(1)", transition: "transform 0.2s" }}>
                {tab.icon}
              </div>
              <span style={{ fontSize: 10, fontWeight: active ? 700 : 500 }}>{tab.label}</span>
              {active && <div style={{ width: 4, height: 4, borderRadius: 99, background: T.accent }} />}
            </button>
          );
        })}
      </div>

      {/* Settings Modal */}
      {showSettings && (
        <div style={{ position: "fixed", top: 0, left: 0, right: 0, bottom: 0, zIndex: 300, background: "rgba(0,0,0,0.7)", display: "flex", alignItems: "center", justifyContent: "center" }}>
          <div style={{ width: "90%", maxWidth: 400, background: T.card, borderRadius: 20, padding: 24, border: "1px solid " + T.border }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 20 }}>
              <span style={{ fontSize: 16, fontWeight: 800, color: T.text }}>⚙️ 설정</span>
              <button onClick={() => setShowSettings(false)} style={{ background: "none", border: "none", color: T.textSec, fontSize: 18, cursor: "pointer" }}>✕</button>
            </div>
            <div style={{ marginBottom: 16 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: T.textSec, display: "block", marginBottom: 6 }}>Google Gemini API Key</label>
              <input type="password" value={apiKeyInput} onChange={e => setApiKeyInput(e.target.value)} placeholder="AIza..."
                style={{ width: "100%", padding: "12px", background: T.inputBg, border: "1px solid " + T.border, borderRadius: 10, color: T.text, fontSize: 14, outline: "none", boxSizing: "border-box", fontFamily: "monospace" }} />
              <div style={{ fontSize: 11, color: T.textDim, marginTop: 6, lineHeight: 1.5 }}>AI 명함 스캔에 필요 · 무료 사용 가능<br/><a href="https://aistudio.google.com/apikey" target="_blank" style={{ color: T.accent }}>👉 무료 API 키 발급받기 (Google AI Studio)</a></div>
            </div>
            <div style={{ padding: "10px 14px", borderRadius: 10, marginBottom: 16, background: apiKeyInput ? "rgba(34,197,94,0.1)" : "rgba(245,158,11,0.1)", border: "1px solid " + (apiKeyInput ? "#22C55E33" : "#F59E0B33") }}>
              <div style={{ fontSize: 13, fontWeight: 700, color: apiKeyInput ? "#22C55E" : "#F59E0B" }}>{apiKeyInput ? "✅ AI 스캔 사용 가능 (Gemini 무료)" : "⚠️ 수동 입력 모드"}</div>
            </div>
            <div style={{ display: "flex", gap: 8 }}>
              <button onClick={() => { saveApiKey(apiKeyInput); setShowSettings(false); }} style={{ flex: 1, padding: "12px", borderRadius: 10, border: "none", background: T.accent, color: "#fff", fontSize: 14, fontWeight: 700, cursor: "pointer" }}>저장</button>
              {apiKeyInput && <button onClick={() => { setApiKeyInput(""); saveApiKey(""); }} style={{ padding: "12px 16px", borderRadius: 10, border: "1px solid " + T.border, background: T.inputBg, color: T.red, fontSize: 13, fontWeight: 600, cursor: "pointer" }}>키 삭제</button>}
            </div>
            <div style={{ marginTop: 16, paddingTop: 16, borderTop: "1px solid " + T.border, display: "flex", gap: 8 }}>
              <button onClick={() => { const d=localStorage.getItem(STORAGE_KEY); if(d){const b=new Blob([d],{type:"application/json"});const a=document.createElement("a");a.href=URL.createObjectURL(b);a.download="cantonfair_backup.json";a.click();} }}
                style={{ flex: 1, padding: "8px", borderRadius: 8, border: "1px solid " + T.border, background: T.inputBg, color: T.textSec, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>💾 백업</button>
              <button onClick={() => { if(confirm("모든 데이터를 삭제하시겠습니까?")){localStorage.removeItem(STORAGE_KEY);location.reload();} }}
                style={{ padding: "8px 12px", borderRadius: 8, border: "1px solid #EF444433", background: "rgba(239,68,68,0.08)", color: T.red, fontSize: 12, fontWeight: 600, cursor: "pointer" }}>🗑️ 초기화</button>
            </div>
          </div>
        </div>
      )}

      {/* Scan Modal */}
      {showScan && (
        <ScanView
          onSave={handleSave}
          onCancel={() => { setShowScan(false); setEditCard(null); }}
          editData={editCard}
        />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<CantonFairBizCard />);
</script>
</body>
</html>
